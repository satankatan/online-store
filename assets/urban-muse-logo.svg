<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" role="img" aria-label="Urban Muse logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19112a" />
      <stop offset="0.55" stop-color="#411f66" />
      <stop offset="1" stop-color="#7f2db9" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f3dff" />
      <stop offset="1" stop-color="#ff6b9b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2b163f" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="600" rx="56" fill="url(#bg)" />

  <g opacity="0.14">
    <path d="M60 420 C 220 240, 420 220, 560 320 C 700 420, 900 460, 1140 260" fill="none" stroke="#ffffff" stroke-width="20" />
    <path d="M80 480 C 260 330, 460 310, 600 390 C 740 470, 940 500, 1120 340" fill="none" stroke="#ffffff" stroke-width="14" />
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="120" width="960" height="360" rx="44" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22" />
  </g>

  <g transform="translate(190 165)">
    <g>
      <circle cx="80" cy="80" r="78" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4" />
      <path d="M40 115 L80 35 L120 115" fill="none" stroke="url(#accent)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M55 98 Q80 78 105 98" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="7" stroke-linecap="round" />
      <path d="M60 125 Q80 145 100 125" fill="none" stroke="#ffffff" stroke-opacity="0.65" stroke-width="6" stroke-linecap="round" />
    </g>

    <g transform="translate(190 0)">
      <text x="0" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="1.4">Urban Muse</text>
      <rect x="0" y="110" width="440" height="8" rx="4" fill="url(#accent)" opacity="0.95" />
      <text x="0" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#ffffff" fill-opacity="0.82">Capsule collections • Fast delivery</text>
    </g>
  </g>
</svg>
